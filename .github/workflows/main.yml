name: Auto Convert Node

on:
  push:
    branches: [ main ]
    paths:
      - 'nodes.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    # 必须显式声明写权限
    permissions:
      contents: write
      
    steps:
      - name: 检查仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install pyyaml requests

      - name: 运行转换脚本
        run: python convert.py

      - name: 推送生成的文件到仓库
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          # 关键点：一定要和 convert.py 里的文件名对齐
          git add clash_config.yaml index.html
          
          # 只有在有变动时才提交，防止 workflow 报错
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto Update Nodes [$(date '+%Y-%m-%d %H:%M')]"
            git push
          fi

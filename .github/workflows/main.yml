name: Auto Convert

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: 检查仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装必要插件
        run: pip install pyyaml requests

      # 🟢 降维打击：直接利用系统内置的官方 npm 集群进行内网极速部署，100% 绕过任何 Cloudflare 人机风控
      - name: 强制注入测速内核
        run: |
          rm -f ./mihomo
          npx --yes @metacubex/mihomo-linux-amd64 cp /pnp/mihomo ./mihomo || npx --yes -p @metacubex/mihomo-linux-amd64 -c "cp \$(which mihomo) ./mihomo"
          chmod +x ./mihomo

      - name: 运行转换脚本
        run: python convert.py

      - name: 推送生成的文件到仓库
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add config.yaml index.html
          git commit -m "自动刷新全协议配置系统 (时间: $(date +'%Y-%m-%d %H:%M:%S'))" || true
          git pull --rebase origin main || true
          git push origin main

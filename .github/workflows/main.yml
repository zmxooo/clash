name: Auto Convert

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: 检查仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🟢 核心修复：直接使用 GitHub 官方认可的 Ubuntu APT 系统包管理器，一枪封喉，100% 杜绝人机拦截
      - name: 部署系统级高可用测速核心
        run: |
          sudo apt-get update
          sudo apt-get install -y clash

      - name: 安装必要插件
        run: pip install pyyaml requests

      - name: 运行转换脚本
        run: python convert.py

      - name: 推送生成的文件到仓库
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          # 同时追踪两个输出文件
          git add config.yaml index.html
          
          # 动态时间戳防止 Git 因无变更而终止
          git commit -m "自动刷新全协议配置系统 (时间: $(date +'%Y-%m-%d %H:%M:%S'))" || true
          
          # 先变基解决并发冲突，再推送到主干
          git pull --rebase origin main || true
          git push origin main

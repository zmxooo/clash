name: Auto Convert
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: 检查仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装必要插件
        # 修改 1: 增加了 requests，这是 IP 查询必须的插件
        run: pip install pyyaml requests

      - name: 运行转换脚本
        run: python convert.py

      - name: 推送生成的文件到仓库
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          # 修改 2: 确保 GitHub 同时更新 config.yaml 和 index.html (小火箭订阅)
          git add config.yaml index.html
          git commit -m "自动更新订阅文件" || exit 0
          git push

name: Auto Convert

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: 检查仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装必要插件
        run: pip install pyyaml requests

      # 🟢 就在这里切入系统级强制注入，直接下载 100% 纯正的 Linux 64位二进制程序并强行授权
      - name: 强制注入测速内核
        run: |
          rm -f ./mihomo
          curl -L -k -A "Mozilla/5.0" -o ./mihomo "https://ghproxy.com"
          chmod +x ./mihomo

      - name: 运行转换脚本
        run: python convert.py
      - name: 运行转换脚本
        run: python convert.py

      - name: 推送生成的文件到仓库
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          
          # 同时追踪两个输出文件
          git add config.yaml index.html
          
          # 动态时间戳防止 Git 因无变更而终止
          git commit -m "自动刷新全协议配置系统 (时间: $(date +'%Y-%m-%d %H:%M:%S'))" || true
          
          # 先变基解决并发冲突，再推送到主干
          git pull --rebase origin main || true
          git push origin main

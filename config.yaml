mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
proxies: []
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies:
  - 🎬 自动选择
  - 🎯 手动选择
  - DIRECT
- name: 🎬 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: []
- name: 🎯 手动选择
  type: select
  proxies: []
rules:
- MATCH,🚀 节点选择

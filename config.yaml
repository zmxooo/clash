mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
global-ua: clash.meta
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub
  - https://alidns.com
proxies:
- type: vless
  server: 163.5.58.211
  port: 443
  tls: true
  sni: fastcdn.hoyoverse.com
  skip-cert-verify: true
  udp: true
  uuid: 245fcfc2-0c80-49d3-b28f-fd8f4f43aaab
  cipher: auto
  name: 🧿其它地区 @zmxooo 01
- type: vless
  server: 163.5.58.211

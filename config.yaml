rules:
- RULE-SET,reject,🛑 广告拦截
- RULE-SET,telegram,📱 电报消息
- RULE-SET,netflix,🎥 奈飞视频
- RULE-SET,bilibili,🐼 国内媒体
- DOMAIN-KEYWORD,openai,🤖 人工智能
- DOMAIN-KEYWORD,anthropic,🤖 人工智能
- DOMAIN-KEYWORD,chatgpt,🤖 人工智能
- DOMAIN-SUFFIX,tw,🎯 台湾媒体
- RULE-SET,google,📢 谷歌服务
- RULE-SET,apple,🍎 苹果服务
- RULE-SET,proxy,🎬 国际媒体
- RULE-SET,direct,⚓ 直连域名
- RULE-SET,gcland,⚓ 直连域名
- GEOIP,CN,DIRECT
- MATCH,🌍 漏网之鱼

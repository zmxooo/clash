mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
dns:
  enable: true
  enhanced-mode: fake-ip
  nameserver:
  - 223.5.5.5
  - 119.29.29.29
  - 8.8.8.8
proxies: []
proxy-groups:
- name: 🚀 节点选择
  type: select
  proxies: []
- name: ⚡ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: []
rules:
- GEOIP,CN,DIRECT
- MATCH,🚀 节点选择
